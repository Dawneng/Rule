HK = NameRegex, FilterKey = "(?i)🇭🇰|香港|(\b(HK|HKG|Hong)\b)"
US = NameRegex, FilterKey = "(?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)\b)"
SG = NameRegex, FilterKey = "(?i)🇸🇬|新加坡|狮|(\b(SG|SGP|Singapore)\b)"
JP = NameRegex, FilterKey = "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)\b)"
TW = NameRegex, FilterKey = "(?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)\b)"
KR = NameRegex, FilterKey = "(?i)🇰🇷|韩国|韓|首尔|(\b(KR|KOR|Korea)\b)"

